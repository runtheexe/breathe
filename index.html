<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>breathe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
  <script>
    // Favicon — line art cat icon
    const link = document.createElement('link');
    link.rel = 'icon'; link.type = 'image/svg+xml'; link.href = 'assets/cat-icon.svg';
    document.head.appendChild(link);

    // Overlay image — full quality cat.png
    document.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('cat-icon');
      el.src = 'assets/cat.png';
      el.onload = () => { el.style.opacity = '0.7'; };
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #9ecfee; font-family: 'Cormorant Garamond', Georgia, serif; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.52);
      color: #fff;
    }
    #overlay h1 {
      font-size: 2.5rem; font-weight: 300;
      letter-spacing: 0.12em; margin-bottom: 0.4rem;
    }
    #overlay .sub { font-size: 1rem; opacity: 0.65; }
    #overlay .hint {
      margin-top: 1.1rem; font-size: 0.78rem;
      opacity: 0.45; letter-spacing: 0.04em;
    }

    #crosshair {
      display: none; position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(255, 255, 255, 0.72);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { height: 2px; width: 100%; top: 50%;  transform: translateY(-50%); }

    #joystick-base {
      display: none; position: fixed;
      width: 112px; height: 112px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.05);
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 10;
    }
    #joystick-knob {
      position: absolute; width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.20);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    #season {
      position: fixed; bottom: 1.2rem; right: 1.4rem;
      color: rgba(255,255,255,0.5); font-size: 0.75rem;

      font-family: system-ui, sans-serif;
    }

    #vignette {
      position: fixed; inset: 0; pointer-events: none;

<body>

<div id="overlay">
  <img id="cat-icon" style="width:140px;height:auto;margin-bottom:0rem;opacity:0;filter:brightness(0) invert(1);transition:opacity 0.4s;" />
  <h1>breathe</h1>
  <p class="sub">click to begin</p>
  <p class="hint"></p>
</div>
<div id="crosshair"></div>
<div id="season"></div>
<div id="vignette"></div>
<div id="joystick-base"><div id="joystick-knob"></div></div>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';

// ─── RENDERER ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.82;
document.body.appendChild(renderer.domElement);

// ─── SCENE ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec8a0); // spring sky
scene.fog = new THREE.Fog(0x7ab890, 6, 55);   // forest mist

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 50);
camera.position.set(0, 1.62, 2.2);

// ─── POST-PROCESSING ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.90,  // strength
  0.50,  // radius
  0.75   // threshold — window opening and bright sky get a gentle glow
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ─── ROOM DIMENSIONS ─────────────────────────────────────────────────────────
const RW = 5.0;   // width  (x)
const RH = 2.65;  // height (y)
const RD = 5.0;   // depth  (z)
// Window is on the FRONT wall (z = −RD/2), so camera starts looking at it.
// Camera default look-direction is −z, so this is natural.

// ─── LIGHTING ────────────────────────────────────────────────────────────────
// Warm indoor ambient
const ambientLight = new THREE.AmbientLight(0xd8c8a0, 0.46);
scene.add(ambientLight);

// Warm interior fill — keeps shadowed walls from going cold
const fillLight = new THREE.PointLight(0xff9050, 0.35, 12.0);
fillLight.position.set(0, 2.0, 0);
scene.add(fillLight);

// Sunlight through window – slightly angled cool daylight
const sun = new THREE.DirectionalLight(0xf8d8a0, 0.85);
sun.position.set(-1.8, 3.5, -RD / 2 - 5);
sun.target.position.set(0, 0.5, RD / 2);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 50;
sun.shadow.camera.left = -14; sun.shadow.camera.right  = 14;
sun.shadow.camera.top  = 12;  sun.shadow.camera.bottom = -6;
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(sun.target);


// ─── TEXTURES ────────────────────────────────────────────────────────────────
function makeFloorTex() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');

  const pw = 14, pl = 56, gap = 2;
  const tones = ['#3e2c1a','#321e10','#46301e','#3a2618','#4a3422','#362416'];
  const sq2 = Math.sqrt(2);

  // Dark grout
  ctx.fillStyle = '#0e0804';
  ctx.fillRect(0, 0, 512, 512);

  function plank(cx, cy, angle) {
    const col = tones[Math.floor(Math.random() * tones.length)];
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.fillStyle = col;
    ctx.fillRect(-pl/2 + gap/2, -pw/2 + gap/2, pl - gap, pw - gap);
    // grain lines along the plank
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = '#2a1408';
    ctx.lineWidth = 0.5;
    for (let g = 1; g <= 3; g++) {
      const gy = -pw/2 + gap/2 + g * (pw - gap) / 4;
      ctx.beginPath();
      ctx.moveTo(-pl/2 + gap, gy + (Math.random()-0.5)*2);
      ctx.lineTo( pl/2 - gap, gy + (Math.random()-0.5)*2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Herringbone: columns alternate +45° and -45°, offset by half a row
  const colSpacing = pl / sq2;
  const rowSpacing = pw * sq2;
  const cols = Math.ceil(512 / colSpacing) + 4;
  const rows = Math.ceil(512 / rowSpacing) + 4;

  for (let ci = -2; ci < cols; ci++) {
    for (let ri = -2; ri < rows; ri++) {
      const cx = ci * colSpacing;
      const cy = ri * rowSpacing + (ci % 2 === 0 ? 0 : rowSpacing / 2);
      plank(cx, cy, ci % 2 === 0 ? Math.PI/4 : -Math.PI/4);
    }
  }

  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(RW / 2, RD / 2);
  return t;
}

const floorTex = makeFloorTex();

function makeWallTex() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');

  const logs = [
    { base: '#3a2410', hi: '#5a3a22', lo: '#1e1008' },
    { base: '#2e1c0c', hi: '#4a2e18', lo: '#180e06' },
    { base: '#422a14', hi: '#623e28', lo: '#221408' },
    { base: '#362010', hi: '#503220', lo: '#1c100a' },
    { base: '#2a1808', hi: '#3e2810', lo: '#140c04' },
  ];
  const logH = 82, chink = 5;

  // Dark chinking
  ctx.fillStyle = '#0a0604';
  ctx.fillRect(0, 0, 512, 512);

  let li = 0;
  for (let y = 0; y < 512; y += logH + chink, li++) {
    const log = logs[li % logs.length];
    // Rounded log surface — gradient lighter at crown, darker at base
    const grad = ctx.createLinearGradient(0, y, 0, y + logH);
    grad.addColorStop(0.0,  log.hi);
    grad.addColorStop(0.25, log.base);
    grad.addColorStop(0.75, log.base);
    grad.addColorStop(1.0,  log.lo);
    ctx.fillStyle = grad;
    ctx.fillRect(0, y + chink / 2, 512, logH - chink / 2);

    // Subtle grain running along the log
    ctx.save();
    ctx.globalAlpha = 0.045;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.7;
    for (let g = 0; g < 5; g++) {
      const gx = Math.random() * 400;
      ctx.beginPath();
      ctx.moveTo(gx,        y + logH * 0.3 + (Math.random()-0.5) * 10);
      ctx.lineTo(gx + 80,   y + logH * 0.3 + (Math.random()-0.5) * 10);
      ctx.stroke();
    }
    ctx.restore();
  }

  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(RW / 2, RH / 2);
  return t;
}

// ─── MATERIALS ───────────────────────────────────────────────────────────────
const wallTex  = makeWallTex();
const wallMat  = new THREE.MeshLambertMaterial({ map: wallTex }); // warm wood planks
const floorMat = new THREE.MeshLambertMaterial({ map: floorTex });
const ceilMat  = new THREE.MeshLambertMaterial({ color: 0x6a4a2e }); // dark warm wood
const woodMat  = new THREE.MeshLambertMaterial({ color: 0x7a5233 });
const frameMat = new THREE.MeshLambertMaterial({ color: 0x7a5233 });

// ─── ROOM ────────────────────────────────────────────────────────────────────
// Floor
{
  const m = new THREE.Mesh(new THREE.PlaneGeometry(RW, RD), floorMat);
  m.rotation.x = -Math.PI / 2;
  m.receiveShadow = true;
  scene.add(m);
}

// Ceiling
{
  const m = new THREE.Mesh(new THREE.PlaneGeometry(RW, RD), ceilMat);
  m.rotation.x = Math.PI / 2;
  m.position.y = RH;
  scene.add(m);
}

// Ceiling beams
{
  const beamMat = new THREE.MeshLambertMaterial({ color: 0x4a2e14 });
  [-1.4, 0, 1.4].forEach(bz => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(RW + 0.1, 0.14, 0.20), beamMat);
    m.position.set(0, RH - 0.07, bz);
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
  });
}

// Helper – add a plain rectangular wall plane
function addWall(w, h, x, y, z, ry) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
  m.position.set(x, y, z);
  m.rotation.y = ry;
  m.receiveShadow = true;
  scene.add(m);
}

// Back wall (behind player, z = +RD/2, faces −z inward)
addWall(RW, RH, 0, RH / 2,  RD / 2, Math.PI);
// Left wall (solid)
addWall(RD, RH, -RW / 2, RH / 2, 0, Math.PI / 2);
// Right wall (x = +RW/2, faces −x inward)
addWall(RD, RH,  RW / 2, RH / 2, 0, -Math.PI / 2);

// ─── FRONT WALL WITH WINDOW HOLE ─────────────────────────────────────────────
const WW = 2.8;   // window width
const WH = 1.7;   // window height
const WX = -WW / 2;  // window left edge (local x)
const WY = 0.65;     // window bottom edge (local y)

// Front wall built from four PlaneGeometry panels so texture UVs align with the other walls.
// Each panel gets a cloned texture with repeat/offset matching its world position.
{
  const S = 2; // texture world-units-per-tile (matches makeWallTex repeat basis)
  function frontPanel(pw, ph, cx, cy) {
    // world left/bottom of this panel
    const wx0 = cx - pw / 2, wy0 = cy - ph / 2;
    const t = wallTex.clone();
    t.needsUpdate = true;
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(pw / S, ph / S);
    t.offset.set((wx0 + RW / 2) / S, wy0 / S);
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(pw, ph),
      new THREE.MeshLambertMaterial({ map: t })
    );
    m.position.set(cx, cy, -RD / 2);
    m.receiveShadow = true;
    scene.add(m);
  }

  const leftW  = RW / 2 + WX;          // wall left of window
  const rightW = RW / 2 - (WX + WW);   // wall right of window
  const botH   = WY;                    // wall below window
  const topH   = RH - (WY + WH);       // wall above window

  frontPanel(leftW,  RH,   -RW/2 + leftW/2,        RH/2);
  frontPanel(rightW, RH,    RW/2 - rightW/2,        RH/2);
  frontPanel(WW,     botH,  WX + WW/2,              botH/2);
  frontPanel(WW,     topH,  WX + WW/2,              WY + WH + topH/2);
}

// ─── WINDOW FRAME ────────────────────────────────────────────────────────────
const fT = 0.075;   // frame thickness
const fD = 0.11;    // frame depth (z)
const fZ = -RD / 2 + fD / 2;
const wCX = 0;                  // window center x
const wCY = WY + WH / 2;        // window center y

function frameBox(w, h, d, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), frameMat);
  m.position.set(x, y, z);
  m.castShadow = true;
  scene.add(m);
}
// Outer frame
frameBox(WW + fT * 2, fT, fD, wCX, WY + WH + fT / 2, fZ); // top
frameBox(WW + fT * 2, fT, fD, wCX, WY - fT / 2,       fZ); // bottom
frameBox(fT, WH,      fD, WX - fT / 2,      wCY, fZ); // left
frameBox(fT, WH,      fD, WX + WW + fT / 2, wCY, fZ); // right
// Window sill — chunky wood ledge with front nosing
{
  const sillW = WW + fT * 2 + 0.26;
  const sillD = 0.28;
  const sillH = 0.10;
  // Top clears the frame bar bottom (WY - fT) by 0.008; back clears the wall by 0.008
  const sillTopY = WY - fT - 0.008;
  const sillCY   = sillTopY - sillH / 2;
  const sillCZ   = -RD / 2 + 0.008 + sillD / 2;

  const body = new THREE.Mesh(new THREE.BoxGeometry(sillW, sillH, sillD), woodMat);
  body.position.set(wCX, sillCY, sillCZ);
  body.castShadow = true; body.receiveShadow = true;
  scene.add(body);

}



// ─── DUST MOTES ──────────────────────────────────────────────────────────────
const N_MOTES = 140;
const motePos = new Float32Array(N_MOTES * 3);
const moteOff = new Float32Array(N_MOTES);  // random phase offsets

for (let i = 0; i < N_MOTES; i++) {
  motePos[i * 3]     = (Math.random() - 0.5) * WW * 0.92;
  motePos[i * 3 + 1] = WY + Math.random() * WH;
  motePos[i * 3 + 2] = -RD / 2 + Math.random() * (RD - 0.28);
  moteOff[i] = Math.random() * Math.PI * 2;
}

const moteGeo = new THREE.BufferGeometry();
moteGeo.setAttribute('position', new THREE.BufferAttribute(motePos, 3));
const moteMat = new THREE.PointsMaterial({
  color: 0xffffcc,
  size: 0.012, sizeAttenuation: true,
  transparent: true, opacity: 0.15,
  depthWrite: false,
});
scene.add(new THREE.Points(moteGeo, moteMat));

// ─── FURNITURE ───────────────────────────────────────────────────────────────
function box(w, h, d, mat, x, y, z, ry = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (ry) m.rotation.y = ry;
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}


// ── Rug (circular, medallion pattern)
{
  function makeRugTex() {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const ctx = c.getContext('2d');
    const cx = 256, cy = 256, R = 248;

    // Base field: dark earthy brown-red
    ctx.fillStyle = '#2a1616';
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fill();

    // Single border ring
    ctx.strokeStyle = '#3e3222';
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.arc(cx, cy, R - 14, 0, Math.PI * 2);
    ctx.stroke();


    return new THREE.CanvasTexture(c);
  }

  const rugMat = new THREE.MeshLambertMaterial({ map: makeRugTex() });
  const m = new THREE.Mesh(new THREE.CircleGeometry(1.3, 72), rugMat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(0, 0.002, 0);
  m.receiveShadow = true;
  scene.add(m);
}

// ── Cat — GLB model on the fireplace mantel
new GLTFLoader().load('assets/cat.glb', gltf => {
  const cat = gltf.scene;
  const catBox = new THREE.Box3().setFromObject(cat);
  const size = catBox.getSize(new THREE.Vector3());
  const scale = 0.35 / Math.max(size.x, size.y, size.z);
  cat.scale.setScalar(scale);
  cat.rotation.x = -Math.PI / 2;
  cat.rotation.z = Math.PI - Math.PI / 8 - 15 * Math.PI / 180;
  catBox.setFromObject(cat);
  cat.position.set(-2.2, 1.196 - catBox.min.y, 0);
  cat.traverse(n => {
    if (n.isMesh) {
      n.castShadow = true; n.receiveShadow = true;
      n.material = new THREE.MeshLambertMaterial({ color: 0x3a2e24 });
    }
  });
  scene.add(cat);
});

// ── Bookshelf on back wall
const shelfMat  = new THREE.MeshLambertMaterial({ color: 0x6b4c2e });
const shelfBack = new THREE.MeshLambertMaterial({ color: 0x3e2810 }); // darker back panel
const SX = 0, SZ = RD / 2 - 0.13;
const SW = RW, SH = RH, SD = 0.26;
const SY0 = 0.0;

// Carcass
box(0.04, SH, SD, shelfMat, SX - SW/2 + 0.02, SY0 + SH/2, SZ);
box(0.04, SH, SD, shelfMat, SX + SW/2 - 0.02, SY0 + SH/2, SZ);
box(SW,   0.04, SD, shelfMat, SX, SY0 + 0.02,      SZ);
box(SW,   0.04, SD, shelfMat, SX, SY0 + SH - 0.02, SZ);
box(SW - 0.08, SH, 0.02, shelfBack, SX, SY0 + SH/2, RD/2 - 0.01);

// Inner shelves
const shelf1Y = SY0 + 0.62, shelf2Y = SY0 + 1.24, shelf3Y = SY0 + 1.88;
box(SW - 0.08, 0.04, SD, shelfMat, SX, shelf1Y, SZ);
box(SW - 0.08, 0.04, SD, shelfMat, SX, shelf2Y, SZ);
box(SW - 0.08, 0.04, SD, shelfMat, SX, shelf3Y, SZ);

// Books — fills shelf width by cycling through colors palette
function addBooks(baseY, maxH, colors) {
  let bx = SX - SW / 2 + 0.06;
  const limit = SX + SW / 2 - 0.06;
  let i = 0;
  while (bx < limit) {
    const col = colors[i++ % colors.length];
    const bw = 0.05 + Math.random() * 0.04;
    const bh = maxH * (0.55 + Math.random() * 0.45);
    const lean = (Math.random() - 0.5) * 0.10;
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(bw, bh, SD * 0.82),
      new THREE.MeshLambertMaterial({ color: col })
    );
    m.position.set(bx + bw / 2, baseY + bh / 2, SZ);
    m.rotation.y = lean;
    m.castShadow = true;
    scene.add(m);
    bx += bw + 0.006 + Math.random() * 0.012;
  }
}

addBooks(SY0 + 0.04,   0.52, [0x5a2820,0x7a5828,0x4a3818,0x6a3818,0x8a6830,0x5a3c18,0x3a2e18,0x6a4820,0x7a3820,0x4a2e18,0x5a4828,0x8a5030,0x3a2818,0x6a5038,0x7a6040,0x5a3028]);
addBooks(shelf1Y + 0.04, 0.46, [0x6a3020,0x5a4820,0x3a3018,0x7a5030,0x4a2818,0x6a5838,0x8a6028,0x4a3818,0x5a2828,0x7a4828,0x3a2e20,0x6a4030,0x8a5828,0x5a3820,0x4a4018]);
addBooks(shelf2Y + 0.04, 0.38, [0x5a3028,0x7a5020,0x4a3818,0x6a4830,0x3a2818,0x8a6038,0x5a4020,0x6a3020,0x7a5838,0x4a2e18,0x5a4828,0x6a5030,0x3a3018,0x7a4030,0x5a3828]);
addBooks(shelf3Y + 0.04, 0.32, [0x6a3828,0x5a4018,0x4a2e18,0x7a5830,0x3a2818,0x6a4828,0x8a5828,0x5a3028,0x6a5038,0x4a3818,0x7a4030,0x5a2820,0x6a4820,0x3a3018]);


// ── Fireplace (left wall, centred — faces +x into the room)
{
  const stoneMat  = new THREE.MeshLambertMaterial({ color: 0x7a6650 });
  const mantelMat = new THREE.MeshLambertMaterial({ color: 0x4a2e14 });
  const sootMat   = new THREE.MeshBasicMaterial({ color: 0x0e0c08 });

  const FX = -RW / 2, FZ = 0, FD = 0.36; // left wall, z-centred, depth into room
  const FC = FX + FD / 2; // x-centre of surround geometry
  // Stone columns (flank opening in z)
  box(FD, 0.92, 0.22, stoneMat, FC, 0.46, FZ - 0.485);
  box(FD, 0.92, 0.22, stoneMat, FC, 0.46, FZ + 0.485);
  // Lintel
  box(FD, 0.22, 1.19, stoneMat, FC, 0.92 + 0.11, FZ);

const SEASON_CYCLE = 54; // 4 × 13.5s pad cycle — one season per pad cycle

// [spring, summer, autumn, winter]
const SEASONS = [
  { name: 'spring',
    bg: 0x8ec8a0, fog: 0x7ab890,
    leaf: 0x72c85a, shrub: 0x58b048, ground: 0x2a3a18,
    ambCol: 0xe8dcc0, ambInt: 0.52,
    sunCol: 0xffe8c8, sunInt: 1.10 },
  { name: 'summer',
    bg: 0x68b882, fog: 0x58a872,
    leaf: 0x2a7020, shrub: 0x388030, ground: 0x1e2a14,
    ambCol: 0xe0d0a0, ambInt: 0.56,
    sunCol: 0xfce8a0, sunInt: 1.30 },
  { name: 'autumn',
    bg: 0xd88030, fog: 0xc87020,
    leaf: 0xd06010, shrub: 0x9a4010, ground: 0x3a2810,
    ambCol: 0xf8d080, ambInt: 0.56,
    sunCol: 0xffb830, sunInt: 1.20 },
  { name: 'winter',
    bg: 0xb8d8f0, fog: 0xa8c8e0,
    leaf: 0x3a3a3a, shrub: 0x303030, ground: 0xd0d8d0,
    ambCol: 0xd0dcea, ambInt: 0.42,
    sunCol: 0xe8f4ff, sunInt: 0.72 },
];

// Pre-convert to THREE.Color for lerping
const SC = SEASONS.map(s => ({
  bg:     new THREE.Color(s.bg),
  fog:    new THREE.Color(s.fog),
  leaf:   new THREE.Color(s.leaf),
  shrub:  new THREE.Color(s.shrub),
  ground: new THREE.Color(s.ground),
  ambCol: new THREE.Color(s.ambCol),
  ambInt: s.ambInt,
  sunCol: new THREE.Color(s.sunCol),
  sunInt: s.sunInt,
}));

function smoothstep(x) { return x * x * (3 - 2 * x); }

function applySeasons(t) {
  const raw = (t % SEASON_CYCLE) / SEASON_CYCLE * 4; // 0–4
  const idx  = Math.floor(raw) % 4;
  const frac = smoothstep(raw - Math.floor(raw));
  const a = SC[idx], b = SC[(idx + 1) % 4];

  scene.background.lerpColors(a.bg,     b.bg,     frac);
  scene.fog.color .lerpColors(a.fog,    b.fog,    frac);
  leafMat.color   .lerpColors(a.leaf,   b.leaf,   frac);
  shrubMat.color  .lerpColors(a.shrub,  b.shrub,  frac);
  groundMat.color .lerpColors(a.ground, b.ground, frac);
  ambientLight.color    .lerpColors(a.ambCol, b.ambCol, frac);
  ambientLight.intensity = a.ambInt + (b.ambInt - a.ambInt) * frac;
  sun.color              .lerpColors(a.sunCol, b.sunCol, frac);
  sun.intensity          = a.sunInt + (b.sunInt - a.sunInt) * frac;

  const seasonEl = document.getElementById('season');
  seasonEl.textContent = SEASONS[idx].name;
  const textFade = frac < 0.15 ? frac / 0.15 : frac > 0.85 ? (1 - frac) / 0.15 : 1;
  seasonEl.style.opacity = textFade.toFixed(3);

  // Autumn leaves: bell curve peaking mid-autumn, gone by winter
  const autumnAmt = idx === 2 ? Math.sin(frac * Math.PI) :
                    idx === 1 ? Math.max(0, (frac - 0.8) / 0.2) : 0;
  leavesMat.opacity = autumnAmt * 0.8;

  // Winter snow: builds in late autumn, full in winter, gone by spring
  const snowAmt = idx === 3 ? 1 :
                  idx === 2 ? Math.max(0, (frac - 0.7) / 0.3) : 0;
  snowMat.opacity     = snowAmt * 0.75;
}

// ─── AMBIENT MUSIC (Web Audio API, procedural) ───────────────────────────────
let audioCtx = null;
let masterGain = null;
let purrGain = null;


function startMusic() {
  if (audioCtx) { audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master output with gentle overall volume
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.22, audioCtx.currentTime + 4); // fade in
  masterGain.connect(audioCtx.destination);

  // Two-tap feedback delay → spacious reverb feel
  const dL = audioCtx.createDelay(4);  dL.delayTime.value = 1.18;
  const dR = audioCtx.createDelay(4);  dR.delayTime.value = 0.89;
  const fbL = audioCtx.createGain();   fbL.gain.value = 0.36;
  const fbR = audioCtx.createGain();   fbR.gain.value = 0.33;
  const revGain = audioCtx.createGain(); revGain.gain.value = 0.42;
  dL.connect(fbL); fbL.connect(dL); dL.connect(revGain);
  dR.connect(fbR); fbR.connect(dR); dR.connect(revGain);
  revGain.connect(masterGain);

  // Play one note: two detuned sines + ADSR envelope
  function playNote(freq, vol, attack, hold, release, when) {
    const o1 = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    o1.type = o2.type = 'sine';
    o1.frequency.value = freq;
    o2.frequency.value = freq * 1.0038; // gentle chorus detune
    env.gain.setValueAtTime(0.0001, when);
    env.gain.linearRampToValueAtTime(vol,        when + attack);
    env.gain.linearRampToValueAtTime(vol * 0.72, when + attack + hold);
    env.gain.exponentialRampToValueAtTime(0.0001, when + attack + hold + release);
    o1.connect(env); o2.connect(env);
    env.connect(masterGain);
    env.connect(dL); env.connect(dR); // send to reverb
    const end = when + attack + hold + release + 0.1;
    o1.start(when); o2.start(when);
    o1.stop(end);   o2.stop(end);
  }

  // C major pentatonic (C D E G A) — no tension intervals
  const C3=130.81, D3=146.83, E3=164.81, G3=196.00, A3=220.00;
  const C4=261.63, D4=293.66, E4=329.63, G4=392.00, A4=440.00;
  const C5=523.25, E5=659.25, G5=783.99;

  // ── Drone: soft low C, plays forever
  {
    const o = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = o2.type = 'sine';
    o.frequency.value = 65.41;       // C2
    o2.frequency.value = 65.41 * 1.002;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.055, audioCtx.currentTime + 5);
    o.connect(g); o2.connect(g);
    g.connect(masterGain);
    o.start(); o2.start();
  }

  // ── Pad: slow C-major chord arpeggio, cycles every ~14 s
  const padChord = [C3, E3, G3, C4, E4];
  function schedulePad() {
    const t = audioCtx.currentTime + 0.1;
    padChord.forEach((freq, i) => playNote(freq, 0.07, 2.2, 4.5, 3.5, t + i * 1.1));
    setTimeout(schedulePad, 13_500);
  }

  // ── Melody: sparse random pentatonic notes
  const melodyPool = [G3, A3, C4, D4, E4, G4, A4, C5, E5, G5];
  function scheduleMelody() {
    const freq = melodyPool[Math.floor(Math.random() * melodyPool.length)];
    playNote(freq, 0.048, 1.4, 2.0, 4.2, audioCtx.currentTime + 0.05);
    setTimeout(scheduleMelody, Math.random() * 5500 + 3000); // every 3–8.5 s
  }

  // Stagger starts so it doesn't all hit at once
  setTimeout(schedulePad,    200);
  setTimeout(scheduleMelody, 3500);

  // ── Clock tick/tock — 60 BPM, lookahead scheduled for precision
  const tickGain = audioCtx.createGain();
  tickGain.gain.value = 0.038;
  tickGain.connect(masterGain);

  function fireTick(when, isTock) {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = isTock ? 1800 : 2400; // tock lower, tick higher
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(1.0, when + 0.0005);
    env.gain.exponentialRampToValueAtTime(0.0001, when + 0.005);
    osc.connect(env);
    env.connect(tickGain);
    osc.start(when);
    osc.stop(when + 0.008);
  }

  let nextTick = audioCtx.currentTime + 1.0;
  let tock = false;
  function scheduleTicks() {
    while (nextTick < audioCtx.currentTime + 0.5) {
      fireTick(nextTick, tock);
      nextTick += 1.0;
      tock = !tock;
    }
    setTimeout(scheduleTicks, 200);
  }
  scheduleTicks();

  // ── Purr: C2 sawtooth, 25 Hz amplitude modulation, proximity-driven
  const purrOsc  = audioCtx.createOscillator();
  const purrOsc2 = audioCtx.createOscillator();
  const purrLFO  = audioCtx.createOscillator();
  const purrLFOGain = audioCtx.createGain();
  const purrMod  = audioCtx.createGain();
  const purrFilt = audioCtx.createBiquadFilter();
  purrGain = audioCtx.createGain();

  purrOsc.type  = purrOsc2.type = 'sawtooth';
  purrOsc.frequency.value  = 65.41;
  purrOsc2.frequency.value = 65.41 * 1.012;
  purrLFO.frequency.value  = 25;
  purrLFOGain.gain.value   = 0.45;
  purrMod.gain.value       = 0.5;
  purrFilt.type = 'lowpass';
  purrFilt.frequency.value = 200;
  purrFilt.Q.value = 0.7;
  purrGain.gain.value = 0;

  purrOsc.connect(purrFilt);
  purrOsc2.connect(purrFilt);
  purrFilt.connect(purrMod);
  purrLFO.connect(purrLFOGain);
  purrLFOGain.connect(purrMod.gain);
  purrMod.connect(purrGain);
  purrGain.connect(masterGain);

  purrOsc.start(); purrOsc2.start(); purrLFO.start();
}

// ── MOBILE ───────────────────────────────────────────────────────────────────
let mobileActive = false;
let mobilePitch = 0, mobileYaw = 0;
let lookId = null, moveId = null;
let lookLast = { x: 0, y: 0 };
let joyCentre = { x: 0, y: 0 };
let joyDelta  = { x: 0, y: 0 };
const MAX_JOY = 52;

if (isMobile) {
  overlay.addEventListener('click', () => {
    overlay.style.display = 'none';
    mobileActive = true;
    startMusic();
  });

  const cvs = renderer.domElement;

  cvs.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.clientX < window.innerWidth / 2 && moveId === null) {
        moveId = t.identifier;
        joyCentre = { x: t.clientX, y: t.clientY };
        joyDelta  = { x: 0, y: 0 };
        jBase.style.left = t.clientX + 'px';
        jBase.style.top  = t.clientY + 'px';
        jBase.style.display = 'block';
      } else if (t.clientX >= window.innerWidth / 2 && lookId === null) {
        lookId   = t.identifier;
        lookLast = { x: t.clientX, y: t.clientY };
      }
    }
  }, { passive: false });

  cvs.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === lookId) {
        mobileYaw   -= (t.clientX - lookLast.x) * 0.004;
        mobilePitch -= (t.clientY - lookLast.y) * 0.004;
        mobilePitch  = THREE.MathUtils.clamp(mobilePitch, -Math.PI * 0.42, Math.PI * 0.42);
        lookLast = { x: t.clientX, y: t.clientY };
      }
      if (t.identifier === moveId) {
        joyDelta = { x: t.clientX - joyCentre.x, y: t.clientY - joyCentre.y };
        const len = Math.hypot(joyDelta.x, joyDelta.y);
        const c   = Math.min(len, MAX_JOY);
        const kx  = len > 0 ? joyDelta.x / len * c : 0;
        const ky  = len > 0 ? joyDelta.y / len * c : 0;
        jKnob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
      }
    }
  }, { passive: false });

  cvs.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === lookId) lookId = null;
      if (t.identifier === moveId) {
        moveId = null;
        joyDelta = { x: 0, y: 0 };
        jBase.style.display = 'none';
        jKnob.style.transform = 'translate(-50%, -50%)';
      }
    }
  });
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const SPEED  = 3.6;
const MARGIN = 0.38;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t  = clock.elapsedTime;

  // ── Player movement
  if (!isMobile && controls?.isLocked) {
    if (keys['KeyW'] || keys['ArrowUp'])    controls.moveForward( SPEED * dt);
    if (keys['KeyS'] || keys['ArrowDown'])  controls.moveForward(-SPEED * dt);
    if (keys['KeyA'] || keys['ArrowLeft'])  controls.moveRight(  -SPEED * dt);
    if (keys['KeyD'] || keys['ArrowRight']) controls.moveRight(   SPEED * dt);
  }
  if (isMobile && mobileActive) {
    camera.rotation.y = mobileYaw;
    camera.rotation.x = mobilePitch;
    const len = Math.hypot(joyDelta.x, joyDelta.y);
    if (len > 6) {
      const f   = Math.min(len, MAX_JOY) / MAX_JOY;
      const nx  = joyDelta.x / len * f;
      const ny  = joyDelta.y / len * f;
      const fwd = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, mobileYaw, 0));
      const rgt = new THREE.Vector3(1, 0,  0).applyEuler(new THREE.Euler(0, mobileYaw, 0));
      camera.position.addScaledVector(fwd, -ny * SPEED * dt);
      camera.position.addScaledVector(rgt,  nx * SPEED * dt);
    }
  }
  if (!isMobile && controls?.isLocked || isMobile && mobileActive) {
    camera.position.x = THREE.MathUtils.clamp(camera.position.x, -RW/2 + MARGIN, RW/2 - MARGIN);
    camera.position.z = THREE.MathUtils.clamp(camera.position.z, -RD/2 + MARGIN, RD/2 - MARGIN);
    camera.position.y = 1.62;
  }

  // ── Animate dust motes (gentle float)
  const pos = moteGeo.attributes.position;
  for (let i = 0; i < N_MOTES; i++) {
    const ph = moteOff[i];
    pos.array[i * 3]     += Math.sin(t * 0.4 + ph)       * 0.00045;
    pos.array[i * 3 + 1] += 0.0028 + Math.sin(t * 0.25 + ph * 1.3) * 0.0009;
    pos.array[i * 3 + 2] += Math.sin(t * 0.3 + ph * 0.7) * 0.00025;
    // Wrap: keep motes between window and bookshelf
    const hw = WW * 0.46, hh = WH * 0.46;
    if (pos.array[i * 3]     >  hw) pos.array[i * 3]     = -hw;
    if (pos.array[i * 3]     < -hw) pos.array[i * 3]     =  hw;
    if (pos.array[i * 3 + 1] > WY + WH + 0.15) pos.array[i * 3 + 1] = WY - 0.05;
    if (pos.array[i * 3 + 2] > RD / 2 - 0.28) pos.array[i * 3 + 2] = -RD / 2 + 0.05;
  }
  pos.needsUpdate = true;

  // ── Purr proximity (cat on mantel)
  if (purrGain && audioCtx) {
    const dx = camera.position.x - (-2.2);
    const dz = camera.position.z - 0;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const vol = THREE.MathUtils.clamp(1 - dist / 3.0, 0, 1) * 0.7;
    purrGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.6);
  }

  // ── Seasons — driven by audioCtx time so they pause with music
  applySeasons(audioCtx?.currentTime ?? t);

  // ── Autumn leaves (fall + drift)
  const lp = leavesGeo.attributes.position;
  for (let i = 0; i < N_LEAVES; i++) {
    lp.array[i*3]   += Math.sin(t * 0.5 + leafOff[i]) * 0.003;
    lp.array[i*3+1] -= 0.012 + Math.sin(t * 0.3 + leafOff[i] * 1.4) * 0.003;
    if (lp.array[i*3+1] < -1) { lp.array[i*3+1] = 14; lp.array[i*3] = (Math.random()-0.5)*18; }
  }
  lp.needsUpdate = true;

  // ── Snow (falls straight, gentle drift)
  const sp = snowGeo.attributes.position;
  for (let i = 0; i < N_SNOW; i++) {
    sp.array[i*3]   += Math.sin(t * 0.2 + snowOff[i]) * 0.001;
    sp.array[i*3+1] -= 0.018 + snowOff[i] * 0.003;
    if (sp.array[i*3+1] < -1) { sp.array[i*3+1] = 16; sp.array[i*3] = (Math.random()-0.5)*20; }
  }
  sp.needsUpdate = true;

  // ── Fire flicker — driven by audioCtx time so it pauses/resumes with music
  {
    const at = audioCtx?.currentTime ?? t;
    if (scene._fireLight) {
      scene._fireLight.intensity = 1.6 + Math.sin(at * 1.86) * 0.25 + Math.sin(at * 3.72) * 0.12;
    }
    if (scene._flame) {
      scene._flame.scale.y = 0.95 + Math.sin(at * 1.86) * 0.05 + Math.sin(at * 3.72) * 0.025;
      scene._flame.position.y = 0.16 + (scene._flame.scale.y - 1) * 0.06;
    }
  }

  // Gentle dreamy camera breathe — always present, just barely perceptible
  camera.position.y = 1.62 + Math.sin(t * 0.4) * 0.012;

  composer.render();
}
animate();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.resolution.set(window.innerWidth, window.innerHeight);
});
</script>
