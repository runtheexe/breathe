<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>breathe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
  <script>
    // Favicon — line art cat icon
    const link = document.createElement('link');
    link.rel = 'icon'; link.type = 'image/svg+xml'; link.href = 'assets/cat-icon.svg';
    document.head.appendChild(link);

    // Overlay image — full quality cat.png
    document.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('cat-icon');
      el.src = 'assets/cat.png';
      el.onload = () => { el.style.opacity = '0.7'; };
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #9ecfee; font-family: 'Cormorant Garamond', Georgia, serif; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.52);
      color: #fff;
    }
    #overlay h1 {
      font-size: 2.5rem; font-weight: 300;
      letter-spacing: 0.12em; margin-bottom: 0.4rem;
    }
    #overlay .sub { font-size: 1rem; opacity: 0.65; }
    #overlay .hint {
      margin-top: 1.1rem; font-size: 0.78rem;
      opacity: 0.45; letter-spacing: 0.04em;
    }

    #crosshair {
      display: none; position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(255, 255, 255, 0.72);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { height: 2px; width: 100%; top: 50%;  transform: translateY(-50%); }

    #joystick-base {
      display: none; position: fixed;
      width: 112px; height: 112px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.05);
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 10;
    }
    #joystick-knob {
      position: absolute; width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.20);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    #season {
      position: fixed; bottom: 1.2rem; right: 1.4rem;
      color: rgba(255,255,255,0.5); font-size: 0.75rem;
      letter-spacing: 0.12em; pointer-events: none;
      font-family: system-ui, sans-serif;
    }

    #vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 55%, rgba(10, 6, 20, 0.72) 100%);
    }
  </style>
</head>
<body>

<div id="overlay">
  <img id="cat-icon" style="width:140px;height:auto;margin-bottom:0rem;opacity:0;filter:brightness(0) invert(1);transition:opacity 0.4s;" />
  <h1>breathe</h1>
  <p class="sub">click to begin</p>
  <p class="hint"></p>
</div>
<div id="crosshair"></div>
<div id="season"></div>
<div id="vignette"></div>
<div id="joystick-base"><div id="joystick-knob"></div></div>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';

// ─── RENDERER ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.82;
document.body.appendChild(renderer.domElement);

// ─── SCENE ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7a9e80); // forest canopy, lighter
scene.fog = new THREE.Fog(0x6a8e70, 6, 55);   // close forest mist

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 50);
camera.position.set(0, 1.62, 2.2);

// ─── POST-PROCESSING ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.75,  // strength
  0.50,  // radius
  0.82   // threshold — raised so only bright edges/lights bloom, not the whole sky
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ─── ROOM DIMENSIONS ─────────────────────────────────────────────────────────
const RW = 5.0;   // width  (x)
const RH = 2.65;  // height (y)
const RD = 5.0;   // depth  (z)
// Window is on the FRONT wall (z = −RD/2), so camera starts looking at it.
// Camera default look-direction is −z, so this is natural.

// ─── LIGHTING ────────────────────────────────────────────────────────────────
// Warm indoor ambient
const ambientLight = new THREE.AmbientLight(0xc8d8b8, 0.38); // cool green-filtered forest light
scene.add(ambientLight);

// Sunlight through window – slightly angled cool daylight
const sun = new THREE.DirectionalLight(0xd8e8c8, 0.5); // dappled canopy light
sun.position.set(-1.8, 3.5, -RD / 2 - 5);
sun.target.position.set(0, 0.5, RD / 2);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 32;
sun.shadow.camera.left = -8;  sun.shadow.camera.right  = 8;
sun.shadow.camera.top  =  8;  sun.shadow.camera.bottom = -4;
sun.shadow.bias = -0.002;
scene.add(sun);
scene.add(sun.target);


// ─── TEXTURES ────────────────────────────────────────────────────────────────
function makeFloorTex() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  const plankH = 72;
  const tones = ['#8c6b45', '#7b5c38', '#9c7652', '#856440', '#a07d56'];
  for (let y = 0; y < 512; y += plankH) {
    ctx.fillStyle = tones[Math.floor(y / plankH) % tones.length];
    ctx.fillRect(0, y, 512, plankH);
    // grain lines
    ctx.save(); ctx.globalAlpha = 0.06;
    for (let g = 0; g < 5; g++) {
      ctx.strokeStyle = '#000'; ctx.lineWidth = 0.6;
      ctx.beginPath();
      const gy = y + (g / 5) * plankH + (Math.random() - 0.5) * 6;
      ctx.moveTo(0, gy); ctx.lineTo(512, gy + (Math.random() - 0.5) * 10);
      ctx.stroke();
    }
    ctx.restore();
    // gap
    ctx.fillStyle = '#2e1c0a';
    ctx.fillRect(0, y + plankH - 2, 512, 2);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(RW / 1.5, RD / 1.5);
  return t;
}

const floorTex = makeFloorTex();

// ─── MATERIALS ───────────────────────────────────────────────────────────────
const wallMat  = new THREE.MeshLambertMaterial({ color: 0xe8e2f0 }); // soft lavender-white
const floorMat = new THREE.MeshLambertMaterial({ map: floorTex });
const ceilMat  = new THREE.MeshLambertMaterial({ color: 0xf0ecf8 }); // pale lilac ceiling
const woodMat  = new THREE.MeshLambertMaterial({ color: 0x7a5233 });
const frameMat = new THREE.MeshLambertMaterial({ color: 0xf0ead6 });

// ─── ROOM ────────────────────────────────────────────────────────────────────
// Floor
{
  const m = new THREE.Mesh(new THREE.PlaneGeometry(RW, RD), floorMat);
  m.rotation.x = -Math.PI / 2;
  m.receiveShadow = true;
  scene.add(m);
}

// Ceiling
{
  const m = new THREE.Mesh(new THREE.PlaneGeometry(RW, RD), ceilMat);
  m.rotation.x = Math.PI / 2;
  m.position.y = RH;
  scene.add(m);
}

// Helper – add a plain rectangular wall plane
function addWall(w, h, x, y, z, ry) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
  m.position.set(x, y, z);
  m.rotation.y = ry;
  m.receiveShadow = true;
  scene.add(m);
}

// Back wall (behind player, z = +RD/2, faces −z inward)
addWall(RW, RH, 0, RH / 2,  RD / 2, Math.PI);
// Left wall (solid)
addWall(RD, RH, -RW / 2, RH / 2, 0, Math.PI / 2);
// Right wall (x = +RW/2, faces −x inward)
addWall(RD, RH,  RW / 2, RH / 2, 0, -Math.PI / 2);

// ─── FRONT WALL WITH WINDOW HOLE ─────────────────────────────────────────────
const WW = 1.9;   // window width
const WH = 1.55;  // window height
const WX = -WW / 2;  // window left edge (local x)
const WY = 0.82;     // window bottom edge (local y)

const frontShape = new THREE.Shape();
frontShape.moveTo(-RW / 2, 0);
frontShape.lineTo( RW / 2, 0);
frontShape.lineTo( RW / 2, RH);
frontShape.lineTo(-RW / 2, RH);
frontShape.closePath();

const winHole = new THREE.Path();
winHole.moveTo(WX,      WY);
winHole.lineTo(WX + WW, WY);
winHole.lineTo(WX + WW, WY + WH);
winHole.lineTo(WX,      WY + WH);
winHole.closePath();
frontShape.holes.push(winHole);

{
  const m = new THREE.Mesh(new THREE.ShapeGeometry(frontShape), wallMat);
  m.position.z = -RD / 2;
  // ShapeGeometry normal is +z by default → faces inward ✓
  m.receiveShadow = true;
  scene.add(m);
}

// ─── WINDOW FRAME ────────────────────────────────────────────────────────────
const fT = 0.075;   // frame thickness
const fD = 0.11;    // frame depth (z)
const fZ = -RD / 2 + fD / 2;
const wCX = 0;                  // window center x
const wCY = WY + WH / 2;        // window center y

function frameBox(w, h, d, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), frameMat);
  m.position.set(x, y, z);
  m.castShadow = true;
  scene.add(m);
}
// Outer frame
frameBox(WW + fT * 2, fT, fD, wCX, WY + WH + fT / 2, fZ); // top
frameBox(WW + fT * 2, fT, fD, wCX, WY - fT / 2,       fZ); // bottom
frameBox(fT, WH,      fD, WX - fT / 2,      wCY, fZ); // left
frameBox(fT, WH,      fD, WX + WW + fT / 2, wCY, fZ); // right
// Window sill
{
  const m = new THREE.Mesh(new THREE.BoxGeometry(WW + fT * 2 + 0.22, 0.055, 0.20), frameMat);
  m.position.set(wCX, WY - 0.012, -RD / 2 + 0.105);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
}

// ─── LIGHT SHAFT ─────────────────────────────────────────────────────────────
// Subtle translucent box – just a hint of volumetric light
{
  const g = new THREE.BoxGeometry(WW - 0.01, WH - 0.01, RD);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xfff5d8,
    transparent: true, opacity: 0.045,
    depthWrite: false, side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
  });
  const m = new THREE.Mesh(g, mat);
  m.position.set(wCX, wCY, -0.01);
  scene.add(m);
}


// ─── DUST MOTES ──────────────────────────────────────────────────────────────
const N_MOTES = 280;
const motePos = new Float32Array(N_MOTES * 3);
const moteOff = new Float32Array(N_MOTES);  // random phase offsets

for (let i = 0; i < N_MOTES; i++) {
  motePos[i * 3]     = (Math.random() - 0.5) * WW * 0.92;
  motePos[i * 3 + 1] = WY + Math.random() * WH;
  motePos[i * 3 + 2] = -RD / 2 + Math.random() * RD;
  moteOff[i] = Math.random() * Math.PI * 2;
}

const moteGeo = new THREE.BufferGeometry();
moteGeo.setAttribute('position', new THREE.BufferAttribute(motePos, 3));
const moteMat = new THREE.PointsMaterial({
  color: 0xffffcc,
  size: 0.022, sizeAttenuation: true,
  transparent: true, opacity: 0.55,
  depthWrite: false,
});
scene.add(new THREE.Points(moteGeo, moteMat));

// ─── FURNITURE ───────────────────────────────────────────────────────────────
function box(w, h, d, mat, x, y, z, ry = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (ry) m.rotation.y = ry;
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}

// ── Table
const TX = -1.4, TZ = 0.5;
box(1.45, 0.055, 0.78, woodMat, TX, 0.77, TZ);
[[-0.62, -0.32], [0.62, -0.32], [-0.62, 0.32], [0.62, 0.32]].forEach(([lx, lz]) =>
  box(0.055, 0.77, 0.055, woodMat, TX + lx, 0.385, TZ + lz)
);

// ── Chair
const CX = -1.4, CZ = 1.1;
box(0.52, 0.048, 0.52, woodMat, CX, 0.45, CZ);       // seat
box(0.52, 0.60,  0.04, woodMat, CX, 0.78, CZ + 0.26); // backrest
[[-0.21, -0.21], [0.21, -0.21], [-0.21, 0.21], [0.21, 0.21]].forEach(([lx, lz]) =>
  box(0.042, 0.45, 0.042, woodMat, CX + lx, 0.225, CZ + lz)
);

// ── Cat — GLB model on the table
new GLTFLoader().load('assets/cat.glb', gltf => {
  const cat = gltf.scene;

  // Fit the model to roughly 0.35 units tall
  const catBox = new THREE.Box3().setFromObject(cat);
  const size = catBox.getSize(new THREE.Vector3());
  const scale = 0.35 / Math.max(size.x, size.y, size.z);
  cat.scale.setScalar(scale);
  cat.rotation.x = -Math.PI / 2;
  cat.rotation.z = Math.PI - Math.PI / 8;

  // Sit it on the table top
  catBox.setFromObject(cat);
  cat.position.set(TX, 0.798 - catBox.min.y, TZ);

  cat.traverse(n => {
    if (n.isMesh) {
      n.castShadow = true; n.receiveShadow = true;
      n.material = new THREE.MeshLambertMaterial({ color: 0xb8956e }); // warm tan
    }
  });
  scene.add(cat);
});

// ── Bookshelf on back wall
const shelfMat = new THREE.MeshLambertMaterial({ color: 0x6b4c2e });
const SX = 1.2, SZ = RD / 2 - 0.13;
box(2.1, 0.048, 0.24, shelfMat, SX, 1.72, SZ);          // shelf board
box(0.048, 0.38, 0.24, shelfMat, SX - 1.0, 1.53, SZ);   // left bracket
box(0.048, 0.38, 0.24, shelfMat, SX + 1.0, 1.53, SZ);   // right bracket

// Books
const bookColors = [0x8b2020, 0x1a4a8b, 0x2a6b2a, 0x8b6b20, 0x5a1a8b, 0x8b4a1a, 0x306060];
let bx = SX - 0.92;
bookColors.forEach(col => {
  const bw = 0.09 + Math.random() * 0.07;
  const bh = 0.19 + Math.random() * 0.08;
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(bw, bh, 0.20),
    new THREE.MeshLambertMaterial({ color: col })
  );
  m.position.set(bx + bw / 2, 1.724 + bh / 2, SZ);
  m.rotation.y = (Math.random() - 0.5) * 0.14;
  m.castShadow = true;
  scene.add(m);
  bx += bw + 0.008;
});


// ─── EXTERIOR SCENE — dense forest wrapping all sides ────────────────────────

// Dark forest floor — all around the cabin
const groundMat = new THREE.MeshLambertMaterial({ color: 0x1e2a14 });
{
  const m = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), groundMat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(0, -0.01, 0);
  m.receiveShadow = true;
  scene.add(m);
}

// Shared tree materials — updated by season
const leafMat  = new THREE.MeshLambertMaterial({ color: 0x1e4018 });
const trunkMat = new THREE.MeshLambertMaterial({ color: 0x3a2010 });

// Pine tree — 4 stacked cones
function addTree(x, z, scale = 1.0) {
  const s = scale;
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.10*s, 0.17*s, 2.0*s, 7), trunkMat);
  trunk.position.set(x, 1.0*s, z);
  trunk.castShadow = true; trunk.receiveShadow = true;
  scene.add(trunk);
  [
    { r: 1.00*s, h: 2.2*s, y: 2.3*s },
    { r: 0.76*s, h: 2.0*s, y: 3.7*s },
    { r: 0.52*s, h: 1.8*s, y: 5.0*s },
    { r: 0.30*s, h: 1.5*s, y: 6.1*s },
  ].forEach(({ r, h, y }) => {
    const cone = new THREE.Mesh(new THREE.ConeGeometry(r, h, 7), leafMat);
    cone.position.set(x, y, z);
    cone.castShadow = true;
    scene.add(cone);
  });
}

// Small shrub — felt at the base of trees
const shrubMat = new THREE.MeshLambertMaterial({ color: 0x2a4a1a });
function addShrub(x, z) {
  const mat = shrubMat;
  [0, 0.55, -0.45, 0.3].forEach((ox, i) => {
    const oz = [0, 0.2, 0.4, -0.3][i];
    const r  = [0.35, 0.28, 0.22, 0.25][i];
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 5), mat);
    m.position.set(x + ox, r * 0.7, z + oz);
    m.scale.y = 0.65;
    scene.add(m);
  });
}

// ── FRONT (z < -RD/2) ── towering trees straight ahead
addTree(  0.3, -RD/2 -  2.5, 3.8);
addTree( -1.6, -RD/2 -  3.2, 3.5);
addTree(  2.8, -RD/2 -  3.8, 4.0);
addTree( -3.4, -RD/2 -  4.5, 3.2);
addTree(  1.0, -RD/2 -  8,   2.5);
addTree( -2.0, -RD/2 -  9,   2.3);
addTree(  5.0, -RD/2 - 10,   2.7);
addTree( -5.0, -RD/2 - 11,   2.4);
addTree(  0.0, -RD/2 - 15,   2.0);
addTree(  4.0, -RD/2 - 20,   1.8);
addTree( -4.0, -RD/2 - 22,   1.7);
addShrub(  1.5, -RD/2 - 2.0);
addShrub( -1.0, -RD/2 - 2.8);
addShrub(  3.5, -RD/2 - 3.5);


// ── RIGHT SIDE (x > +RW/2)
addTree(  RW/2 + 1.8, -1.0, 3.4);
addTree(  RW/2 + 2.5,  1.5, 3.0);
addTree(  RW/2 + 1.5, -3.5, 3.2);
addTree(  RW/2 + 3.5,  3.5, 2.7);
addTree(  RW/2 + 5.0, -0.5, 2.5);

// ── BEHIND (z > +RD/2) ── forest closes in from the back
addTree(  0.5, RD/2 + 2.0, 3.5);
addTree( -2.0, RD/2 + 2.5, 3.0);
addTree(  2.5, RD/2 + 3.0, 3.2);
addTree( -0.5, RD/2 + 5.5, 2.5);
addTree(  4.0, RD/2 + 4.0, 2.8);
addShrub( 1.0, RD/2 + 1.5);
addShrub(-1.5, RD/2 + 2.0);

// ─── SEASONS ─────────────────────────────────────────────────────────────────
const SEASON_CYCLE = 54; // 4 × 13.5s pad cycle — one season per pad cycle

// [spring, summer, autumn, winter]
const SEASONS = [
  { name: 'spring',
    bg: 0x9abba0, fog: 0x8aab90,
    leaf: 0x5a9a4a, shrub: 0x4a8a3a, ground: 0x2a3a18,
    ambCol: 0xd8ecd0, ambInt: 0.44,
    sunCol: 0xffe8d0, sunInt: 0.60 },
  { name: 'summer',
    bg: 0x7a9e80, fog: 0x6a8e70,
    leaf: 0x1e4018, shrub: 0x2a4a1a, ground: 0x1e2a14,
    ambCol: 0xc8d8b8, ambInt: 0.38,
    sunCol: 0xd8e8c8, sunInt: 0.50 },
  { name: 'autumn',
    bg: 0xa07840, fog: 0x906830,
    leaf: 0xb05810, shrub: 0x7a4010, ground: 0x3a2810,
    ambCol: 0xead0a0, ambInt: 0.46,
    sunCol: 0xffcc70, sunInt: 0.68 },
  { name: 'winter',
    bg: 0xb8ccd8, fog: 0xa8bcc8,
    leaf: 0x3a3a3a, shrub: 0x303030, ground: 0xd0d8d0,
    ambCol: 0xc0cce0, ambInt: 0.34,
    sunCol: 0xd0e8f8, sunInt: 0.32 },
];

// Pre-convert to THREE.Color for lerping
const SC = SEASONS.map(s => ({
  bg:     new THREE.Color(s.bg),
  fog:    new THREE.Color(s.fog),
  leaf:   new THREE.Color(s.leaf),
  shrub:  new THREE.Color(s.shrub),
  ground: new THREE.Color(s.ground),
  ambCol: new THREE.Color(s.ambCol),
  ambInt: s.ambInt,
  sunCol: new THREE.Color(s.sunCol),
  sunInt: s.sunInt,
}));

function smoothstep(x) { return x * x * (3 - 2 * x); }

function applySeasons(t) {
  const raw = (t % SEASON_CYCLE) / SEASON_CYCLE * 4; // 0–4
  const idx  = Math.floor(raw) % 4;
  const frac = smoothstep(raw - Math.floor(raw));
  const a = SC[idx], b = SC[(idx + 1) % 4];

  scene.background.lerpColors(a.bg,     b.bg,     frac);
  scene.fog.color .lerpColors(a.fog,    b.fog,    frac);
  leafMat.color   .lerpColors(a.leaf,   b.leaf,   frac);
  shrubMat.color  .lerpColors(a.shrub,  b.shrub,  frac);
  groundMat.color .lerpColors(a.ground, b.ground, frac);
  ambientLight.color    .lerpColors(a.ambCol, b.ambCol, frac);
  ambientLight.intensity = a.ambInt + (b.ambInt - a.ambInt) * frac;
  sun.color              .lerpColors(a.sunCol, b.sunCol, frac);
  sun.intensity          = a.sunInt + (b.sunInt - a.sunInt) * frac;

  const seasonEl = document.getElementById('season');
  seasonEl.textContent = SEASONS[idx].name;
  const textFade = frac < 0.15 ? frac / 0.15 : frac > 0.85 ? (1 - frac) / 0.15 : 1;
  seasonEl.style.opacity = textFade.toFixed(3);

  // Autumn leaves: bell curve peaking mid-autumn, gone by winter
  const autumnAmt = idx === 2 ? Math.sin(frac * Math.PI) :
                    idx === 1 ? Math.max(0, (frac - 0.8) / 0.2) : 0;
  leavesMat.opacity = autumnAmt * 0.8;

  // Winter snow: builds in late autumn, full in winter, gone by spring
  const snowAmt = idx === 3 ? 1 :
                  idx === 2 ? Math.max(0, (frac - 0.7) / 0.3) : 0;
  snowMat.opacity     = snowAmt * 0.75;
  snowSillMat.opacity = snowAmt * 0.95;
}

// ── Autumn falling leaves
const N_LEAVES = 180;
const leafPos  = new Float32Array(N_LEAVES * 3);
const leafOff  = new Float32Array(N_LEAVES);
for (let i = 0; i < N_LEAVES; i++) {
  leafPos[i*3]   = (Math.random() - 0.5) * 18;
  leafPos[i*3+1] = Math.random() * 14;
  leafPos[i*3+2] = -RD/2 - Math.random() * 12;
  leafOff[i] = Math.random() * Math.PI * 2;
}
const leavesGeo = new THREE.BufferGeometry();
leavesGeo.setAttribute('position', new THREE.BufferAttribute(leafPos, 3));
const leavesMat = new THREE.PointsMaterial({
  color: 0xd06020, size: 0.12, sizeAttenuation: true,
  transparent: true, opacity: 0, depthWrite: false,
});
scene.add(new THREE.Points(leavesGeo, leavesMat));

// ── Winter snow
const N_SNOW = 350;
const snowPos = new Float32Array(N_SNOW * 3);
const snowOff = new Float32Array(N_SNOW);
for (let i = 0; i < N_SNOW; i++) {
  snowPos[i*3]   = (Math.random() - 0.5) * 20;
  snowPos[i*3+1] = Math.random() * 16;
  snowPos[i*3+2] = -RD/2 - Math.random() * 12;
  snowOff[i] = Math.random() * Math.PI * 2;
}
const snowGeo = new THREE.BufferGeometry();
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
const snowMat = new THREE.PointsMaterial({
  color: 0xeef4ff, size: 0.08, sizeAttenuation: true,
  transparent: true, opacity: 0, depthWrite: false,
});
scene.add(new THREE.Points(snowGeo, snowMat));

// ── Snow on window sill
const snowSillMat = new THREE.MeshLambertMaterial({
  color: 0xeef4ff, transparent: true, opacity: 0,
});
{
  const m = new THREE.Mesh(new THREE.BoxGeometry(WW + fT * 2 + 0.22, 0.025, 0.20), snowSillMat);
  m.position.set(wCX, WY - 0.001, -RD / 2 + 0.105);
  scene.add(m);
}

// ─── AMBIENT MUSIC (Web Audio API, procedural) ───────────────────────────────
let audioCtx = null;
let masterGain = null;
let purrGain = null;

function startMusic() {
  if (audioCtx) { audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master output with gentle overall volume
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.22, audioCtx.currentTime + 4); // fade in
  masterGain.connect(audioCtx.destination);

  // Two-tap feedback delay → spacious reverb feel
  const dL = audioCtx.createDelay(4);  dL.delayTime.value = 1.18;
  const dR = audioCtx.createDelay(4);  dR.delayTime.value = 0.89;
  const fbL = audioCtx.createGain();   fbL.gain.value = 0.36;
  const fbR = audioCtx.createGain();   fbR.gain.value = 0.33;
  const revGain = audioCtx.createGain(); revGain.gain.value = 0.42;
  dL.connect(fbL); fbL.connect(dL); dL.connect(revGain);
  dR.connect(fbR); fbR.connect(dR); dR.connect(revGain);
  revGain.connect(masterGain);

  // Play one note: two detuned sines + ADSR envelope
  function playNote(freq, vol, attack, hold, release, when) {
    const o1 = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    o1.type = o2.type = 'sine';
    o1.frequency.value = freq;
    o2.frequency.value = freq * 1.0038; // gentle chorus detune
    env.gain.setValueAtTime(0.0001, when);
    env.gain.linearRampToValueAtTime(vol,        when + attack);
    env.gain.linearRampToValueAtTime(vol * 0.72, when + attack + hold);
    env.gain.exponentialRampToValueAtTime(0.0001, when + attack + hold + release);
    o1.connect(env); o2.connect(env);
    env.connect(masterGain);
    env.connect(dL); env.connect(dR); // send to reverb
    const end = when + attack + hold + release + 0.1;
    o1.start(when); o2.start(when);
    o1.stop(end);   o2.stop(end);
  }

  // C major pentatonic (C D E G A) — no tension intervals
  const C3=130.81, D3=146.83, E3=164.81, G3=196.00, A3=220.00;
  const C4=261.63, D4=293.66, E4=329.63, G4=392.00, A4=440.00;
  const C5=523.25, E5=659.25, G5=783.99;

  // ── Drone: soft low C, plays forever
  {
    const o = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = o2.type = 'sine';
    o.frequency.value = 65.41;       // C2
    o2.frequency.value = 65.41 * 1.002;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.055, audioCtx.currentTime + 5);
    o.connect(g); o2.connect(g);
    g.connect(masterGain);
    o.start(); o2.start();
  }

  // ── Pad: slow C-major chord arpeggio, cycles every ~14 s
  const padChord = [C3, E3, G3, C4, E4];
  function schedulePad() {
    const t = audioCtx.currentTime + 0.1;
    padChord.forEach((freq, i) => playNote(freq, 0.07, 2.2, 4.5, 3.5, t + i * 1.1));
    setTimeout(schedulePad, 13_500);
  }

  // ── Melody: sparse random pentatonic notes
  const melodyPool = [G3, A3, C4, D4, E4, G4, A4, C5, E5, G5];
  function scheduleMelody() {
    const freq = melodyPool[Math.floor(Math.random() * melodyPool.length)];
    playNote(freq, 0.048, 1.4, 2.0, 4.2, audioCtx.currentTime + 0.05);
    setTimeout(scheduleMelody, Math.random() * 5500 + 3000); // every 3–8.5 s
  }

  // Stagger starts so it doesn't all hit at once
  setTimeout(schedulePad,    200);
  setTimeout(scheduleMelody, 3500);

  // ── Clock tick/tock — 60 BPM, lookahead scheduled for precision
  const tickGain = audioCtx.createGain();
  tickGain.gain.value = 0.038;
  tickGain.connect(masterGain);

  function fireTick(when, isTock) {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = isTock ? 1800 : 2400; // tock lower, tick higher
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(1.0, when + 0.0005);
    env.gain.exponentialRampToValueAtTime(0.0001, when + 0.005);
    osc.connect(env);
    env.connect(tickGain);
    osc.start(when);
    osc.stop(when + 0.008);
  }

  let nextTick = audioCtx.currentTime + 1.0;
  let tock = false;
  function scheduleTicks() {
    while (nextTick < audioCtx.currentTime + 0.5) {
      fireTick(nextTick, tock);
      nextTick += 1.0;
      tock = !tock;
    }
    setTimeout(scheduleTicks, 200);
  }
  scheduleTicks();

  // ── Purr: C2 sawtooth, 25 Hz amplitude modulation, proximity-driven
  const purrOsc  = audioCtx.createOscillator();
  const purrOsc2 = audioCtx.createOscillator();
  const purrLFO  = audioCtx.createOscillator();
  const purrLFOGain = audioCtx.createGain();
  const purrMod  = audioCtx.createGain();
  const purrFilt = audioCtx.createBiquadFilter();
  purrGain = audioCtx.createGain();

  purrOsc.type  = purrOsc2.type = 'sawtooth';
  purrOsc.frequency.value  = 65.41;          // C2 — same as drone
  purrOsc2.frequency.value = 65.41 * 1.012;  // subtle chorus
  purrLFO.frequency.value  = 25;             // purr rhythm (~cat range)
  purrLFOGain.gain.value   = 0.45;           // depth of modulation
  purrMod.gain.value       = 0.5;            // DC offset so gain stays positive
  purrFilt.type = 'lowpass';
  purrFilt.frequency.value = 200;            // keep only the warm rumble
  purrFilt.Q.value = 0.7;
  purrGain.gain.value = 0;                   // starts silent, driven by proximity

  purrOsc.connect(purrFilt);
  purrOsc2.connect(purrFilt);
  purrFilt.connect(purrMod);
  purrLFO.connect(purrLFOGain);
  purrLFOGain.connect(purrMod.gain);         // LFO modulates amplitude
  purrMod.connect(purrGain);
  purrGain.connect(masterGain);

  purrOsc.start(); purrOsc2.start(); purrLFO.start();
}

function pauseMusic() { audioCtx?.suspend(); }

// ─── CONTROLS ────────────────────────────────────────────────────────────────
const isMobile = navigator.maxTouchPoints > 0;
camera.rotation.order = 'YXZ';

const overlay   = document.getElementById('overlay');
const crosshair = document.getElementById('crosshair');
const jBase     = document.getElementById('joystick-base');
const jKnob     = document.getElementById('joystick-knob');

// Update hint text to match platform
overlay.querySelector('.hint').textContent = isMobile
  ? 'left side · move    |    right side · look'
  : 'wasd · move    |    mouse · look    |    esc · pause';

// ── DESKTOP ──────────────────────────────────────────────────────────────────
let controls = null;
const keys = {};

if (!isMobile) {
  controls = new PointerLockControls(camera, renderer.domElement);
  overlay.addEventListener('click', () => { startMusic(); controls.lock(); });
  controls.addEventListener('lock', () => {
    overlay.style.display = 'none';
    crosshair.style.display = 'block';
    audioCtx?.resume();
  });
  controls.addEventListener('unlock', () => {
    overlay.style.display = 'flex';
    crosshair.style.display = 'none';
    pauseMusic();
  });
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
}

// ── MOBILE ───────────────────────────────────────────────────────────────────
let mobileActive = false;
let mobilePitch = 0, mobileYaw = 0;
let lookId = null, moveId = null;
let lookLast = { x: 0, y: 0 };
let joyCentre = { x: 0, y: 0 };
let joyDelta  = { x: 0, y: 0 };
const MAX_JOY = 52;

if (isMobile) {
  overlay.addEventListener('click', () => {
    overlay.style.display = 'none';
    mobileActive = true;
    startMusic();
  });

  const cvs = renderer.domElement;

  cvs.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.clientX < window.innerWidth / 2 && moveId === null) {
        moveId = t.identifier;
        joyCentre = { x: t.clientX, y: t.clientY };
        joyDelta  = { x: 0, y: 0 };
        jBase.style.left = t.clientX + 'px';
        jBase.style.top  = t.clientY + 'px';
        jBase.style.display = 'block';
      } else if (t.clientX >= window.innerWidth / 2 && lookId === null) {
        lookId   = t.identifier;
        lookLast = { x: t.clientX, y: t.clientY };
      }
    }
  }, { passive: false });

  cvs.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === lookId) {
        mobileYaw   -= (t.clientX - lookLast.x) * 0.004;
        mobilePitch -= (t.clientY - lookLast.y) * 0.004;
        mobilePitch  = THREE.MathUtils.clamp(mobilePitch, -Math.PI * 0.42, Math.PI * 0.42);
        lookLast = { x: t.clientX, y: t.clientY };
      }
      if (t.identifier === moveId) {
        joyDelta = { x: t.clientX - joyCentre.x, y: t.clientY - joyCentre.y };
        const len = Math.hypot(joyDelta.x, joyDelta.y);
        const c   = Math.min(len, MAX_JOY);
        const kx  = len > 0 ? joyDelta.x / len * c : 0;
        const ky  = len > 0 ? joyDelta.y / len * c : 0;
        jKnob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
      }
    }
  }, { passive: false });

  cvs.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === lookId) lookId = null;
      if (t.identifier === moveId) {
        moveId = null;
        joyDelta = { x: 0, y: 0 };
        jBase.style.display = 'none';
        jKnob.style.transform = 'translate(-50%, -50%)';
      }
    }
  });
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const SPEED  = 3.6;
const MARGIN = 0.38;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t  = clock.elapsedTime;

  // ── Player movement
  if (!isMobile && controls?.isLocked) {
    if (keys['KeyW'] || keys['ArrowUp'])    controls.moveForward( SPEED * dt);
    if (keys['KeyS'] || keys['ArrowDown'])  controls.moveForward(-SPEED * dt);
    if (keys['KeyA'] || keys['ArrowLeft'])  controls.moveRight(  -SPEED * dt);
    if (keys['KeyD'] || keys['ArrowRight']) controls.moveRight(   SPEED * dt);
  }
  if (isMobile && mobileActive) {
    camera.rotation.y = mobileYaw;
    camera.rotation.x = mobilePitch;
    const len = Math.hypot(joyDelta.x, joyDelta.y);
    if (len > 6) {
      const f   = Math.min(len, MAX_JOY) / MAX_JOY;
      const nx  = joyDelta.x / len * f;
      const ny  = joyDelta.y / len * f;
      const fwd = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, mobileYaw, 0));
      const rgt = new THREE.Vector3(1, 0,  0).applyEuler(new THREE.Euler(0, mobileYaw, 0));
      camera.position.addScaledVector(fwd, -ny * SPEED * dt);
      camera.position.addScaledVector(rgt,  nx * SPEED * dt);
    }
  }
  if (!isMobile && controls?.isLocked || isMobile && mobileActive) {
    camera.position.x = THREE.MathUtils.clamp(camera.position.x, -RW/2 + MARGIN, RW/2 - MARGIN);
    camera.position.z = THREE.MathUtils.clamp(camera.position.z, -RD/2 + MARGIN, RD/2 - MARGIN);
    camera.position.y = 1.62;
  }

  // ── Animate dust motes (gentle float)
  const pos = moteGeo.attributes.position;
  for (let i = 0; i < N_MOTES; i++) {
    const ph = moteOff[i];
    pos.array[i * 3]     += Math.sin(t * 0.4 + ph)       * 0.00045;
    pos.array[i * 3 + 1] += 0.0028 + Math.sin(t * 0.25 + ph * 1.3) * 0.0009;
    pos.array[i * 3 + 2] += Math.sin(t * 0.3 + ph * 0.7) * 0.00025;
    // Wrap: keep motes inside the light shaft volume
    const hw = WW * 0.46, hh = WH * 0.46;
    if (pos.array[i * 3]     >  hw) pos.array[i * 3]     = -hw;
    if (pos.array[i * 3]     < -hw) pos.array[i * 3]     =  hw;
    if (pos.array[i * 3 + 1] > WY + WH + 0.15) pos.array[i * 3 + 1] = WY - 0.05;
    if (pos.array[i * 3 + 2] > RD / 2)  pos.array[i * 3 + 2] = -RD / 2 + 0.05;
  }
  pos.needsUpdate = true;

  // ── Purr proximity
  if (purrGain && audioCtx) {
    const dx = camera.position.x - TX;
    const dz = camera.position.z - TZ;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const vol = THREE.MathUtils.clamp(1 - dist / 3.0, 0, 1) * 0.7;
    purrGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.6);
  }

  // ── Seasons — driven by audioCtx time so they pause with music
  applySeasons(audioCtx?.currentTime ?? t);

  // ── Autumn leaves (fall + drift)
  const lp = leavesGeo.attributes.position;
  for (let i = 0; i < N_LEAVES; i++) {
    lp.array[i*3]   += Math.sin(t * 0.5 + leafOff[i]) * 0.003;
    lp.array[i*3+1] -= 0.012 + Math.sin(t * 0.3 + leafOff[i] * 1.4) * 0.003;
    if (lp.array[i*3+1] < -1) { lp.array[i*3+1] = 14; lp.array[i*3] = (Math.random()-0.5)*18; }
  }
  lp.needsUpdate = true;

  // ── Snow (falls straight, gentle drift)
  const sp = snowGeo.attributes.position;
  for (let i = 0; i < N_SNOW; i++) {
    sp.array[i*3]   += Math.sin(t * 0.2 + snowOff[i]) * 0.001;
    sp.array[i*3+1] -= 0.018 + snowOff[i] * 0.003;
    if (sp.array[i*3+1] < -1) { sp.array[i*3+1] = 16; sp.array[i*3] = (Math.random()-0.5)*20; }
  }
  sp.needsUpdate = true;

  // Gentle dreamy camera breathe — always present, just barely perceptible
  camera.position.y = 1.62 + Math.sin(t * 0.4) * 0.012;

  composer.render();
}
animate();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.resolution.set(window.innerWidth, window.innerHeight);
});
</script>
